<!DOCTYPE html>
<html>
<head>
<title>RECRUZEN - Company Dashboard</title>
<style>
body {font-family: Arial; background: #f5f7fa;}
.header {background: #1e293b; color: white; padding: 20px; display: flex; justify-content: space-between;}
.credits {background: #22c55e; padding: 8px 15px; border-radius: 20px;}
.container {max-width: 1100px; margin: 20px auto; padding: 20px;}
.filters {background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px;}
.filters select,.filters input {padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ddd;}
.card {background: white; padding: 20px; margin-bottom: 15px; border-radius: 15px;}
.new-tag {background: #10b981; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px;}
.btn {background: #22c55e; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;}
</style>
</head>
<body>

<div class="header">
    <div><b>RECRUZEN</b></div>
    <div>Credits: <span class="credits" id="creditCount">10</span></div>
</div>

<div class="container">
    <div class="filters">
        <h3>Search Candidates</h3>
        <input type="text" id="jobTitle" placeholder="Job Title: Recruiter, Developer">
        <input type="text" id="skillSearch" placeholder="Skills: Java, ATS">
        <select id="noticePeriod">
            <option value="">Any Notice Period</option>
            <option value="Immediately">Immediately</option>
            <option value="15 Days">15 Days</option>
            <option value="30 Days">30 Days</option>
        </select>
        <button class="btn" onclick="searchCandidates()">Search</button>
    </div>

    <div id="candidateList"></div>
</div>

<script>
let credits = parseInt(localStorage.getItem("recruzenCredits")) || 10;
let allCandidates = [];

// 5 Dummy + 1 Real candidate data
const dummyData = [
    {name: "Priya Sharma", designation: "Senior Recruiter", jobType: "30 Days", skills: "Recruitment, ATS, LinkedIn", location: "Bangalore", exp: 5, isNew: false},
    {name: "Rahul Verma", designation: "Java Developer", jobType: "Immediately", skills: "Java, Spring Boot, Microservices", location: "Hyderabad", exp: 4, isNew: false},
    {name: "Anjali Mehta", designation: "HR Manager", jobType: "15 Days", skills: "HRBP, Talent Acquisition, Payroll", location: "Mumbai", exp: 7, isNew: false},
    {name: "Suresh Kumar", designation: "DevOps Engineer", jobType: "30 Days", skills: "AWS, Docker, Kibana, Grafana", location: "Chennai", exp: 6, isNew: false},
    {name: "Kavya Reddy", designation: "IT Support Specialist", jobType: "Immediately", skills: "WebSphere, J2EE, Support", location: "Visakhapatnam", exp: 3, isNew: false},
];

window.onload = function() {
    document.getElementById('creditCount').innerText = credits;
    loadCandidates();
}

function loadCandidates() {
    allCandidates = [...dummyData];
    let realProfile = localStorage.getItem("talentiqProfile");
    if(realProfile) {
        let p = JSON.parse(realProfile);
        allCandidates.unshift({...p, isNew: true}); // Real profile ni top lo pettu
        // Recruiter view chesadu ani mark chey
        let views = parseInt(localStorage.getItem("profileViews")) || 0;
        localStorage.setItem("profileViews", views + 1);
    }
    displayCandidates(allCandidates);
}

function displayCandidates(candidates) {
    let html = `<h3>Found ${candidates.length} Candidates</h3>`;
    candidates.forEach((c, i) => {
        html += `<div class="card">
            <h4>${c.name} ${c.isNew? '<span class="new-tag">NEW FROM TALENTIQ</span>' : ''}</h4>
            <p><b>Role:</b> ${c.designation}</p>
            <p><b>Experience:</b> ${c.exp} Years | <b>Notice:</b> ${c.jobType} | <b>Location:</b> ${c.location}</p>
            <p><b>Skills:</b> ${c.skills}</p>
            <button class="btn" onclick="downloadResume(${i})">Download Resume</button>
        </div>`;
    });
    document.getElementById('candidateList').innerHTML = html;
}

function searchCandidates() {
    let job = document.getElementById('jobTitle').value.toLowerCase();
    let skill = document.getElementById('skillSearch').value.toLowerCase();
    let notice = document.getElementById('noticePeriod').value;
    
    let filtered = allCandidates.filter(c => {
        return (c.designation.toLowerCase().includes(job) || job === "") &&
               (c.skills.toLowerCase().includes(skill) || skill === "") &&
               (c.jobType.includes(notice) || notice === "")
    });
    displayCandidates(filtered);
}

function downloadResume(index) {
    if(credits <= 0) {alert("No Credits Left!"); return;}
    credits--;
    localStorage.setItem("recruzenCredits", credits);
    document.getElementById('creditCount').innerText = credits;
    
    let c = allCandidates[index];
    const content = `${c.name}\nRole: ${c.designation}\nExp: ${c.exp} Years\nSkills: ${c.skills}`;
    const blob = new Blob([content], {type: 'text/plain'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `${c.name}_Resume.txt`;
    link.click();
    
    alert(`Resume Downloaded! 1 Credit Used. Remaining: ${credits}`);
}
</script>
</body>
</html>
